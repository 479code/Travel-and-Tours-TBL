<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transborder Logistics — Ticketing &amp; Invoicing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF8; --paper-2:#F3F2EE; --panel:#FFFFFF;
    --ink:#15171C; --mute:#6B6F76; --mute-2:#9A9DA3;
    --line:#E4E2DB; --line-soft:#EDECE6;
    --navy:#0B2547; --navy-2:#0E2D58; --navy-soft:#EAEEF3;
    --red:#C8332A; --red-2:#E5503F; --red-soft:#FBEAE8;
    --gold:#A9791F; --gold-soft:#F8F1E2;
    --green:#1E6B45; --green-soft:#E8F3EC;
    --scrim:rgba(11,21,38,.32); --scrim-strong:rgba(11,21,38,.5);
    --shadow-panel:-8px 0 40px rgba(11,21,38,.18);
    --shadow-palette:0 24px 70px rgba(11,21,38,.35);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'IBM Plex Mono','SF Mono',monospace;
    --r-sm:6px; --r-md:10px; --r-lg:16px;
    /* motion tokens — swapped by data-motion attribute on <html> */
    --ease-subtle: cubic-bezier(.4,0,.2,1);
    --ease-tactile: cubic-bezier(.34,1.56,.64,1);
    --dur-fast:140ms; --dur-med:220ms; --dur-slow:340ms;
    --ease: var(--ease-subtle);
    --lift: 0px;
    --scale-press: 1;
  }
  html[data-theme="dark"]{
    --paper:#15171A; --paper-2:#1C1F23; --panel:#1F2226;
    --ink:#EDEBE5; --mute:#9B9DA3; --mute-2:#6E7076;
    --line:#33363B; --line-soft:#2A2D31;
    --navy:#3D6FB4; --navy-2:#4C7DC2; --navy-soft:#1E2A3A;
    --red:#E5503F; --red-2:#C8332A; --red-soft:#3A2220;
    --gold:#D2A23D; --gold-soft:#332A18;
    --green:#3FA571; --green-soft:#173228;
    --scrim:rgba(0,0,0,.5); --scrim-strong:rgba(0,0,0,.65);
    --shadow-panel:-8px 0 40px rgba(0,0,0,.45);
    --shadow-palette:0 24px 70px rgba(0,0,0,.55);
  }
  html, body{ transition: background var(--dur-med) var(--ease); }
  html, body, .panel, .board, #sidebar, #commandbar, #sidePanel, #palette, .invoice-doc{
    transition: background-color var(--dur-med) var(--ease), border-color var(--dur-med) var(--ease), color var(--dur-med) var(--ease);
  }
  html[data-motion="tactile"]{
    --ease: var(--ease-tactile);
    --dur-fast:160ms; --dur-med:280ms; --dur-slow:420ms;
    --lift: -2px;
    --scale-press: .97;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{-webkit-font-smoothing:antialiased;}
  body{
    font-family:var(--sans); background:var(--paper); color:var(--ink); font-size:14px; line-height:1.5;
    overflow:hidden; height:100vh;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  }

  #app{display:flex; flex-direction:column; height:100vh;}

  /* ===================== COMMAND BAR ===================== */
  #commandbar{
    height:54px; flex-shrink:0; background:var(--navy); display:flex; align-items:center;
    padding:0 16px; gap:16px; color:#fff; z-index:50;
  }
  .cb-brand{display:flex; align-items:center; gap:9px; padding-right:14px; border-right:1px solid rgba(255,255,255,.14);}
  .cb-brand-mark{width:34px; height:34px; flex-shrink:0; position:relative; overflow:hidden; border-radius:6px;}
  .cb-brand-mark img{width:100%; height:100%; object-fit:contain; display:block; animation: markEntrance 900ms var(--ease-tactile) both;}
  .logo-shine{
    position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(75deg, transparent 0%, rgba(255,255,255,.55) 45%, rgba(255,255,255,.85) 50%, rgba(255,255,255,.55) 55%, transparent 100%);
    transform:skewX(-18deg); pointer-events:none; mix-blend-mode:overlay;
    animation: logoShine 5.5s ease-in-out 1.2s infinite;
  }
  @keyframes logoShine{
    0%{ left:-60%; }
    14%{ left:130%; }
    100%{ left:130%; }
  }
  @keyframes markEntrance{
    from{ opacity:0; transform:scale(.7) rotate(-8deg); }
    to{ opacity:1; transform:scale(1) rotate(0); }
  }
  @media (prefers-reduced-motion: reduce){
    .logo-shine{ animation:none; display:none; }
    .cb-brand-mark img{ animation:none; }
  }
  .cb-brand-name{font-weight:700; font-size:13.5px; letter-spacing:-0.01em; white-space:nowrap;}

  .cb-search{
    flex:1; max-width:420px; display:flex; align-items:center; gap:9px; background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.13); border-radius:8px; padding:8px 12px; cursor:pointer;
    transition:background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
  }
  .cb-search:hover{background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.22);}
  .cb-search svg{width:14px; height:14px; color:rgba(255,255,255,.55); flex-shrink:0;}
  .cb-search input{
    background:transparent; border:none; outline:none; color:#fff; font-family:var(--sans); font-size:13px;
    width:100%;
  }
  .cb-search input::placeholder{color:rgba(255,255,255,.42);}
  .cb-kbd{
    font-family:var(--mono); font-size:10px; background:rgba(255,255,255,.12); padding:2px 6px; border-radius:4px;
    color:rgba(255,255,255,.6); flex-shrink:0;
  }

  .cb-spacer{flex:1;}
  .cb-actions{display:flex; align-items:center; gap:8px;}
  .cb-quickadd{
    display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16);
    color:#fff; font-family:var(--sans); font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:7px;
    cursor:pointer; transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
  }
  .cb-quickadd:hover{background:rgba(255,255,255,.18); transform:translateY(var(--lift));}
  .cb-quickadd:active{transform:scale(var(--scale-press));}
  .cb-quickadd svg{width:13px; height:13px;}

  .cb-motion-toggle{
    display:flex; align-items:center; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14);
    border-radius:7px; padding:2px; gap:1px;
  }
  .cb-motion-opt{
    padding:5px 9px; font-size:10.5px; font-weight:600; color:rgba(255,255,255,.55); border-radius:5px; cursor:pointer;
    transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease); font-family:var(--sans);
  }
  .cb-motion-opt.active{background:rgba(255,255,255,.92); color:var(--navy);}

  .cb-icon-toggle{
    width:32px; height:32px; border-radius:7px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.75);
    cursor:pointer; transition:background var(--dur-fast) var(--ease), transform var(--dur-med) var(--ease), color var(--dur-fast) var(--ease);
    flex-shrink:0;
  }
  .cb-icon-toggle:hover{background:rgba(255,255,255,.18); color:#fff;}
  .cb-icon-toggle svg{width:16px; height:16px;}
  .cb-icon-toggle.spin svg{ animation: themeSpin var(--dur-slow) var(--ease); }
  @keyframes themeSpin{ from{transform:rotate(-90deg) scale(.6); opacity:0;} to{transform:rotate(0) scale(1); opacity:1;} }

  .cb-role-select{
    background:rgba(255,255,255,.09); color:#fff; border:1px solid rgba(255,255,255,.14);
    border-radius:7px; padding:7px 9px; font-size:12px; font-family:var(--sans); font-weight:500; cursor:pointer;
  }
  .cb-role-select option{color:#15171C;}

  .cb-avatar{
    width:30px; height:30px; border-radius:7px; background:linear-gradient(135deg,#C8332A,#0B2547 130%);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff;
    flex-shrink:0; cursor:pointer;
  }

  /* ===================== BODY LAYOUT ===================== */
  #body{flex:1; display:flex; min-height:0;}

  /* ===================== SIDEBAR ===================== */
  #sidebar{
    width:222px; background:var(--paper); border-right:1px solid var(--line); flex-shrink:0;
    display:flex; flex-direction:column; padding:16px 12px; overflow-y:auto;
  }
  .nav-home{
    display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:8px; cursor:pointer;
    color:var(--mute); font-size:13.5px; font-weight:600; margin-bottom:14px;
    transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
  }
  .nav-home:hover{background:var(--paper-2); color:var(--ink);}
  .nav-home.active{background:var(--navy-soft); color:var(--navy);}
  .nav-home .nav-icon{width:16px; height:16px;}
  .nav-home .nav-icon svg{width:16px; height:16px;}

  .nav-group{margin-bottom:4px;}
  .nav-group-header{
    display:flex; align-items:center; justify-content:space-between; padding:8px 11px 6px; cursor:pointer;
    user-select:none;
  }
  .nav-group-label{font-size:10px; text-transform:uppercase; letter-spacing:1.1px; color:var(--mute-2); font-weight:700;}
  .nav-group-chevron{
    width:11px; height:11px; color:var(--mute-2); transition:transform var(--dur-med) var(--ease);
    flex-shrink:0;
  }
  .nav-group-chevron svg{width:100%; height:100%;}
  .nav-group.collapsed .nav-group-chevron{transform:rotate(-90deg);}
  .nav-group-items{
    overflow:hidden; transition:max-height var(--dur-med) var(--ease), opacity var(--dur-med) var(--ease);
    max-height:300px; opacity:1;
  }
  .nav-group.collapsed .nav-group-items{max-height:0; opacity:0;}

  .nav-item{
    display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:8px; cursor:pointer;
    color:var(--mute); font-size:13.5px; font-weight:500; user-select:none; position:relative;
    transition:background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
  }
  .nav-item:hover{background:var(--paper-2); color:var(--ink); transform:translateX(2px);}
  .nav-item.active{background:var(--navy-soft); color:var(--navy); font-weight:600;}
  .nav-item.active::before{
    content:''; position:absolute; left:-12px; top:50%; transform:translateY(-50%);
    width:3px; height:16px; background:var(--navy); border-radius:0 3px 3px 0;
    animation: navIndicator var(--dur-med) var(--ease);
  }
  @keyframes navIndicator{ from{height:0; opacity:0;} to{height:16px; opacity:1;} }
  .nav-icon{width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .nav-icon svg{width:15px; height:15px;}
  .nav-count{
    margin-left:auto; font-size:10.5px; font-weight:700; color:var(--mute-2); background:var(--paper-2);
    padding:1px 6px; border-radius:99px; font-family:var(--mono);
  }
  .nav-item.active .nav-count{background:rgba(11,37,71,.1); color:var(--navy);}
  .nav-alert-dot{margin-left:auto; width:7px; height:7px; border-radius:50%; background:var(--red); flex-shrink:0;}

  .sidebar-foot{margin-top:auto; padding-top:14px;}
  .sidebar-foot-card{
    background:var(--paper-2); border:1px solid var(--line); border-radius:10px; padding:13px;
  }
  .sidebar-foot-label{font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--mute-2); font-weight:700; margin-bottom:5px;}
  .sidebar-foot-val{font-size:18px; font-weight:800; color:var(--ink); letter-spacing:-0.01em;}

  /* ===================== MAIN CANVAS ===================== */
  #canvas-wrap{flex:1; display:flex; min-width:0; position:relative; overflow:hidden;}
  #canvas{flex:1; overflow-y:auto; padding:24px 28px 60px; min-width:0;
    transition:filter var(--dur-med) var(--ease);
  }
  #canvas.dimmed{filter:brightness(.97);}

  .page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:20px;}
  .usage-alert-banner{background:var(--orange-soft); border:1px solid var(--orange); border-radius:8px; padding:10px 16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .usage-alert-banner-text{display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--orange);}
  .usage-alert-banner-text svg{width:16px; height:16px; flex-shrink:0;}
  .page-eyebrow{font-size:10.5px; text-transform:uppercase; letter-spacing:1.4px; color:var(--mute-2); font-weight:700; margin-bottom:5px;}
  .page-title{font-size:25px; font-weight:800; letter-spacing:-0.02em; color:var(--ink); line-height:1.1;}

  /* page transition */
  .page-enter{ animation: pageIn var(--dur-slow) var(--ease) both; }
  @keyframes pageIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ===================== ROUTE GLYPH ===================== */
  .flight-line{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); white-space:nowrap;}
  .flight-line .code{font-weight:500; font-size:12.5px; letter-spacing:.3px;}
  .flight-line .track{width:22px; height:1px; background:var(--mute-2); position:relative; flex-shrink:0;}
  .flight-line .track::after{
    content:''; position:absolute; right:-1px; top:-2.5px; width:0; height:0;
    border-left:4px solid var(--mute-2); border-top:2.5px solid transparent; border-bottom:2.5px solid transparent;
  }

  /* ===================== BUTTONS ===================== */
  .btn{
    font-family:var(--sans); font-size:13px; font-weight:600; padding:9px 15px; border-radius:8px;
    border:1px solid var(--line); background:var(--panel); color:var(--ink); cursor:pointer; display:inline-flex;
    align-items:center; gap:7px; white-space:nowrap;
    transition:transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
  }
  .btn:hover{border-color:var(--mute-2); background:var(--paper-2); transform:translateY(var(--lift));}
  .btn:active{transform:scale(var(--scale-press));}
  .btn-primary{background:var(--navy); color:#fff; border-color:var(--navy);}
  .btn-primary:hover{background:var(--navy-2); border-color:var(--navy-2); box-shadow:0 4px 14px rgba(11,37,71,.22);}
  .btn-danger{color:var(--red);}
  .btn-danger:hover{background:var(--red-soft); border-color:var(--red);}
  .btn-sm{padding:6px 11px; font-size:12px;}
  .btn svg{width:14px; height:14px;}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

  /* ===================== KPI BOARD ===================== */
  .board{
    display:flex; border:1px solid var(--line); border-radius:var(--r-md); background:var(--panel);
    margin-bottom:22px; overflow:hidden;
  }
  .board-cell{flex:1; padding:17px 20px; position:relative; transition:background var(--dur-fast) var(--ease);}
  .board-cell:hover{background:var(--paper-2);}
  .board-cell:not(:last-child)::after{
    content:''; position:absolute; right:0; top:17px; bottom:17px; width:1px; background:var(--line);
  }
  .board-label{font-size:10px; text-transform:uppercase; letter-spacing:1.1px; color:var(--mute-2); font-weight:700; margin-bottom:8px;}
  .board-value{font-size:25px; font-weight:800; letter-spacing:-0.02em; color:var(--ink); font-variant-numeric:tabular-nums;}
  .board-delta{font-size:11px; margin-top:5px; color:var(--mute); font-weight:500;}
  .board-delta.up{color:var(--green);}
  .board-delta.down{color:var(--red);}

  /* counting number animation */
  .count-anim{ display:inline-block; }

  /* ===================== PANELS ===================== */
  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r-md);
    margin-bottom:18px; overflow:hidden;
  }
  .panel-header{
    padding:15px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center;
    justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .panel-title{font-size:14.5px; font-weight:700; letter-spacing:-0.01em;}
  .panel-body{padding:18px;}
  .panel-body.flush{padding:0;}

  /* ===================== TABLE ===================== */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--mute-2);
    padding:10px 16px; border-bottom:1px solid var(--line); font-weight:700; white-space:nowrap;
  }
  tbody td{padding:12px 16px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
  tbody tr{transition:background var(--dur-fast) var(--ease);}
  tbody tr:hover{background:var(--paper-2);}
  tbody tr:last-child td{border-bottom:none;}
  td.num, th.num{text-align:right; font-variant-numeric:tabular-nums;}
  td.mono{font-family:var(--mono); font-size:12px; color:var(--mute);}

  tbody.stagger tr{ animation: rowIn var(--dur-med) var(--ease) both; }
  @keyframes rowIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

  .badge{
    display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:99px;
    font-size:10.5px; font-weight:700; letter-spacing:.3px; text-transform:uppercase;
    transition:transform var(--dur-fast) var(--ease);
  }
  .badge-vip{background:var(--gold-soft); color:var(--gold);}
  .badge-regular{background:var(--paper-2); color:var(--mute);}
  .badge-paid{background:var(--green-soft); color:var(--green);}
  .badge-sent{background:var(--navy-soft); color:var(--navy);}
  .badge-overdue{background:var(--red-soft); color:var(--red);}
  .badge-draft{background:var(--paper-2); color:var(--mute);}
  .badge-issued{background:var(--navy-soft); color:var(--navy);}
  .badge-used{background:var(--green-soft); color:var(--green);}
  .badge-cancelled{background:var(--red-soft); color:var(--red);}
  .badge-refunded{background:var(--gold-soft); color:var(--gold);}

  .row-actions{display:flex; gap:6px; opacity:0; transform:translateX(4px); transition:opacity var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);}
  tbody tr:hover .row-actions{opacity:1; transform:translateX(0);}
  .icon-btn{
    width:27px; height:27px; border-radius:7px; border:1px solid var(--line); background:var(--panel);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--mute);
    transition:all var(--dur-fast) var(--ease);
  }
  .icon-btn:hover{background:var(--paper-2); color:var(--ink); transform:translateY(var(--lift));}
  .icon-btn svg{width:13px; height:13px;}

  /* ===================== FORMS ===================== */
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:11.5px; font-weight:600; color:var(--mute); text-transform:uppercase; letter-spacing:.4px;}
  .field input, .field select, .field textarea{
    font-family:var(--sans); font-size:13.5px; padding:9px 11px; border:1px solid var(--line);
    border-radius:8px; background:var(--panel); color:var(--ink); width:100%;
    transition:border-color var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color:var(--navy); box-shadow:0 0 0 3px var(--navy-soft);
  }
  .field .hint{font-size:11px; color:var(--mute-2);}

  /* ===================== SIDE PANEL (replaces modal) ===================== */
  #panelScrim{
    position:fixed; inset:0; background:rgba(11,21,38,0); z-index:90; pointer-events:none;
    transition:background var(--dur-med) var(--ease);
  }
  #panelScrim.open{background:rgba(11,21,38,.32); pointer-events:auto;}

  #sidePanel{
    position:fixed; top:0; right:0; bottom:0; width:480px; max-width:92vw; background:var(--panel);
    box-shadow:-8px 0 40px rgba(11,21,38,.18); z-index:95; display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform var(--dur-slow) var(--ease);
  }
  #sidePanel.open{transform:translateX(0);}
  .sp-header{
    padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;
    flex-shrink:0;
  }
  .sp-title{font-size:17px; font-weight:700; letter-spacing:-0.01em;}
  .sp-sub{font-size:12px; color:var(--mute-2); margin-top:2px; font-weight:500;}
  .sp-close{cursor:pointer; color:var(--mute-2); width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:7px; transition:background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);}
  .sp-close:hover{background:var(--paper-2); transform:rotate(90deg);}
  .sp-body{flex:1; overflow-y:auto; padding:24px;}
  .sp-footer{padding:16px 24px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0;}

  /* wide variant for invoice viewer */
  #sidePanel.wide{width:740px;}

  /* ===================== EMPTY STATE ===================== */
  .empty-state{padding:64px 20px; text-align:center; color:var(--mute-2);}
  .empty-state svg{width:34px; height:34px; margin-bottom:14px; opacity:.45;}
  .empty-state-title{font-size:14.5px; color:var(--mute); margin-bottom:5px; font-weight:600;}
  .empty-state-sub{font-size:12.5px;}

  /* ===================== PASSENGER CARDS ===================== */
  .pax-card{border:1px solid var(--line); border-radius:9px; padding:15px; margin-bottom:11px; background:var(--panel);}
  .pax-card-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;}

  .pax-remove:hover{background:var(--red-soft); color:var(--red);}
  .pax-remove svg{width:13px; height:13px;}

  /* ===================== UPLOAD ZONE ===================== */
  .upload-zone{border:2px dashed var(--line); border-radius:9px; padding:22px; text-align:center; cursor:pointer; transition:all 180ms ease; color:var(--mute-2);}

  .upload-zone svg{width:28px; height:28px; margin:0 auto 9px; opacity:.5;}
  .upload-zone-label{font-size:13px; font-weight:500;}
  .upload-zone-sub{font-size:11.5px; margin-top:4px;}

  .upload-preview-name{font-size:13px; font-weight:500; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* ===================== PROGRESS BAR ===================== */
  .progress-wrap{background:var(--paper-2); border-radius:99px; height:8px; overflow:hidden;}
  .progress-fill{height:100%; border-radius:99px; transition:width .6s ease;}
  .progress-fill.paid{background:var(--green);}
  .progress-fill.partial{background:var(--orange);}
  .progress-fill.pending{background:var(--line);}

  /* ===================== CHECKBOX ===================== */
  .sel-check{width:17px; height:17px; border-radius:5px; border:1.5px solid var(--line); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 180ms ease;}

  /* ===================== KANBAN ===================== */
  .kanban{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  .kanban-col{background:var(--paper-2); border-radius:10px; padding:13px;}
  .kanban-col-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:11px;}
  .kanban-col-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--mute);}
  .kanban-col-count{font-size:10.5px; font-weight:700; color:var(--mute-2); background:var(--panel); padding:1px 8px; border-radius:99px; font-family:var(--mono);}
  .kanban-card{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:12px 13px; margin-bottom:9px; cursor:pointer; transition:all 180ms ease;}
  .kanban-card:hover{border-color:var(--navy); transform:translateY(-1px); box-shadow:0 3px 10px rgba(11,37,71,.08);}
  .kanban-card-pax{font-size:13px; font-weight:600; margin-bottom:4px;}
  .kanban-card-route{font-size:11.5px; color:var(--mute-2); font-family:var(--mono);}
  .kanban-card-date{font-size:11px; color:var(--mute-2); margin-top:7px;}
  .kanban-card-flag{font-size:10.5px; font-weight:700; color:var(--orange); text-transform:uppercase; letter-spacing:.4px; margin-top:5px;}

  /* extra badges for new statuses */
  .badge-pending{background:var(--paper-2); color:var(--mute);}
  .badge-partial{background:var(--orange-soft); color:var(--orange);}
  .badge-flagged{background:var(--orange-soft); color:var(--orange);}

  /* ===================== FILTER BAR ===================== */
  .filter-bar{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .search-box{
    display:flex; align-items:center; gap:8px; border:1px solid var(--line); border-radius:8px;
    padding:8px 12px; background:var(--panel); min-width:220px;
    transition:border-color var(--dur-fast) var(--ease);
  }
  .search-box:focus-within{border-color:var(--navy);}
  .search-box svg{width:14px; height:14px; color:var(--mute-2); flex-shrink:0;}
  .search-box input{border:none; outline:none; font-size:13px; width:100%; font-family:var(--sans); background:transparent;}
  select.filter-select{
    padding:8px 11px; border:1px solid var(--line); border-radius:8px; font-size:12.5px; background:var(--panel);
    color:var(--ink); font-family:var(--sans); font-weight:500;
  }

  /* ===================== INVOICE DOC ===================== */
  .invoice-doc{background:#FFFFFF; padding:36px 38px; color:#15171C;}
  .invoice-doc *{ color:inherit; }
  .invoice-doc .inv-meta-label{color:#9A9DA3 !important;}
  .invoice-doc .inv-brand-sub{color:#9A9DA3 !important;}

  .invoice-doc .inv-totals-row.total{border-top-color:#15171C !important;}
  .invoice-doc .inv-meta-box{background:#F3F2EE !important;}
  .invoice-doc .inv-footer{border-top-color:#E4E2DB !important;}
  .invoice-doc .inv-footer-label{color:#9A9DA3 !important;}
  .invoice-doc .inv-footer-icon{background:#F3F2EE !important; color:#0B2547 !important;}
  .invoice-doc .inv-brand-text{color:#0B2547 !important;}
  .invoice-doc .inv-h1{color:#15171C !important;}
  .invoice-doc .inv-meta-val{color:#15171C !important;}
  .inv-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px;}
  .inv-brand{display:flex; align-items:center; gap:11px;}
  .inv-mark{width:34px; height:40px;}
  .inv-mark img{width:100%; height:100%; object-fit:contain; display:block;}
  .inv-brand-text{font-weight:800; font-size:14px; color:var(--navy); letter-spacing:-0.01em;}
  .inv-brand-sub{font-size:8.5px; color:var(--mute-2); letter-spacing:1.1px; text-transform:uppercase; margin-top:2px; font-weight:700;}
  .inv-h1{font-size:30px; font-weight:800; letter-spacing:.06em; color:var(--ink); text-align:right; align-self:center;}
  .inv-meta-box{
    display:flex; justify-content:space-between; margin-bottom:22px; gap:20px;
    background:var(--paper-2); border-radius:10px; padding:18px 22px;
  }
  .inv-meta-label{font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:var(--mute-2); margin-bottom:4px; font-weight:700;}
  .inv-meta-val{font-size:13px; font-weight:600;}
  table.inv-table{width:100%; border-collapse:collapse; margin-bottom:4px;}
  table.inv-table thead th{font-size:9px; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); border-bottom:1.5px solid var(--ink); padding:8px 5px; text-align:left; font-weight:700;}
  table.inv-table thead th.num{text-align:right;}
  table.inv-table tbody td{padding:10px 5px; border-bottom:1px solid var(--line-soft); font-size:12px;}
  table.inv-table tbody td.num{text-align:right; font-variant-numeric:tabular-nums;}
  table.inv-table tbody td span{color:var(--mute-2);}
  .inv-totals{margin-left:auto; width:260px; margin-top:10px;}
  .inv-totals-row{display:flex; justify-content:space-between; padding:6px 5px; font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.3px;}
  .inv-totals-row.total{border-top:2px solid var(--ink); font-weight:800; font-size:16px; padding-top:11px; margin-top:4px;}
  .inv-footer{
    margin-top:30px; padding-top:20px; border-top:1px solid var(--line); display:flex;
    justify-content:space-between; gap:14px; font-size:10.5px;
  }
  .inv-footer-item{display:flex; align-items:flex-start; gap:8px; flex:1; min-width:0;}
  .inv-footer-item:last-child{flex:1.3;}
  .inv-footer-icon{
    width:28px; height:28px; border-radius:50%; background:var(--paper-2); color:var(--navy);

  }
  .inv-footer-icon svg{width:13px; height:13px;}
  .inv-footer-label{font-size:8.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); font-weight:700; margin-bottom:2px;}
  table.inv-breakdown-table thead th{font-size:9px; text-transform:uppercase; letter-spacing:.5px; background:var(--navy); color:#fff !important; padding:7px 5px; border-bottom:none !important;}
  table.inv-breakdown-table thead th.num{text-align:right;}
  table.inv-breakdown-table tbody td{padding:8px 5px; border-bottom:1px solid var(--line-soft); font-size:12px; vertical-align:top;}
  .invoice-doc table.inv-breakdown-table thead th{color:#fff !important; border-bottom:none !important;}
  .inv-footer-item > div{min-width:0; line-height:1.4;}

  /* ===================== COMMAND PALETTE ===================== */
  #paletteScrim{
    position:fixed; inset:0; background:rgba(11,21,38,0); z-index:190; display:none;
    align-items:flex-start; justify-content:center; padding-top:12vh;
    transition:background var(--dur-med) var(--ease);
  }
  #paletteScrim.open{display:flex; background:rgba(11,21,38,.4);}
  #palette{
    width:560px; max-width:92vw; background:var(--panel); border-radius:14px; box-shadow:0 24px 70px rgba(11,21,38,.35);
    overflow:hidden; transform:scale(.96) translateY(-8px); opacity:0; transition:transform var(--dur-med) var(--ease), opacity var(--dur-med) var(--ease);
  }
  #paletteScrim.open #palette{transform:scale(1) translateY(0); opacity:1;}
  .palette-input-wrap{padding:16px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:11px;}
  .palette-input-wrap svg{width:16px; height:16px; color:var(--mute-2); flex-shrink:0;}
  #paletteInput{border:none; outline:none; font-family:var(--sans); font-size:15px; width:100%; background:transparent;}
  .palette-results{max-height:360px; overflow-y:auto; padding:8px;}
  .palette-item{
    display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:8px; cursor:pointer; font-size:13.5px;
    transition:background var(--dur-fast) var(--ease);
  }
  .palette-item:hover, .palette-item.sel{background:var(--paper-2);}
  .palette-item-icon{width:30px; height:30px; border-radius:7px; background:var(--paper-2); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--mute);}
  .palette-item-icon svg{width:14px; height:14px;}
  .palette-item-text{flex:1; min-width:0;}
  .palette-item-title{font-weight:600; color:var(--ink);}
  .palette-item-sub{font-size:11.5px; color:var(--mute-2); margin-top:1px;}
  .palette-empty{padding:30px; text-align:center; color:var(--mute-2); font-size:13px;}

  .toast{
    position:fixed; bottom:26px; right:26px; background:var(--ink); color:#fff; padding:12px 18px;
    border-radius:9px; font-size:13px; font-weight:500; box-shadow:0 10px 28px rgba(0,0,0,.28); z-index:200;
    opacity:0; transform:translateY(12px) scale(.96); transition:all var(--dur-med) var(--ease); pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateY(0) scale(1);}

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:#D8D5CC; border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media print {
    /* Hide everything except the print window content */
    #sidebar, #commandbar, #sidePanel, #panelScrim, #paletteScrim, .toast,

  }
  /* Print layout for the standalone print window */
  .inv-page {
    width: 210mm;
    min-height: 279mm;
    padding: 18mm 16mm 14mm;
    box-sizing: border-box;
    position: relative;
    background: #fff;
    page-break-after: always;
    break-after: page;
  }
  .inv-page:last-child {
    page-break-after: avoid;
    break-after: avoid;
  }

    display: flex;
    flex-direction: column;

      padding: 0;

    }

      page-break-after: avoid;
      break-after: avoid;
    }

  }

  /* ===================== LOGIN SCREEN ===================== */

<div id="loginScreen">

<script>

function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function fmtMoney(n){
  n = Number(n)||0;
  return '₦' + n.toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtMoneyShort(n){
  n = Number(n)||0;
  if (Math.abs(n) >= 1000000) return '₦' + (n/1000000).toFixed(2) + 'M';
  if (Math.abs(n) >= 1000) return '₦' + (n/1000).toFixed(1) + 'K';
  return '₦' + n.toFixed(0);
}
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDays(iso, days){
  const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function toCSV(headers, rows){
  const esc = v => '"' + String(v??'').replace(/"/g,'""') + '"';
  return [headers.map(esc).join(','), ...rows.map(r=>r.map(esc).join(','))].join('\n');
}
function downloadCSV(filename, csvContent){
  const blob = new Blob([csvContent], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function runExport(){
  const orderId = document.getElementById('exp_order').value;
  const fields = [
    {id:'exp_f_passenger', key:'passenger', label:'Passenger'},
    {id:'exp_f_orderref',  key:'orderref',  label:'Order Ref'},
    {id:'exp_f_client',    key:'client',    label:'Client'},
    {id:'exp_f_airline',   key:'airline',   label:'Airline'},
    {id:'exp_f_route',     key:'route',     label:'Route'},
    {id:'exp_f_ref',       key:'ref',       label:'Booking Ref'},
    {id:'exp_f_date',      key:'date',      label:'Travel Date'},
    {id:'exp_f_cost',      key:'cost',      label:'Ticket Cost'},
    {id:'exp_f_charge',    key:'charge',    label:'Service Charge'},
    {id:'exp_f_vat',       key:'vat',       label:'VAT'},
    {id:'exp_f_total',     key:'total',     label:'Grand Total'},
    {id:'exp_f_status',    key:'status',    label:'Status'},
  ].filter(f=>document.getElementById(f.id)?.checked);
  if (!fields.length){ showToast('Select at least one field'); return; }
  let tickets = [...DB.tickets];
  if (orderId) tickets = tickets.filter(t=>t.orderId===orderId);
  const headers = fields.map(f=>f.label);
  const rows = tickets.map(t=>{
    const o = orderById(t.orderId); const c = clientById(o?.clientId); const a = airlineById(t.airlineId);
    const map = {
      passenger: t.passengerName, orderref: o?.orderRef||'', client: c?.name||'',
      airline: a?.name||'', route: t.route, ref: t.bookingRef||'', date: t.travelDate||'',
      cost: Number(t.ticketCost||0).toFixed(2), charge: Number(t.serviceCharge||0).toFixed(2),
      vat: ticketVat(t).toFixed(2), total: ticketGrandTotal(t).toFixed(2), status: t.status,
    };
    return fields.map(f=>map[f.key]);
  });
  const orderLabel = orderId ? ('_' + (orderById(orderId)?.orderRef||orderId).replace(/[^a-zA-Z0-9]/g,'_')) : '';
  downloadCSV(`Transborder_Tickets${orderLabel}.csv`, toCSV(headers, rows));
  document.getElementById('exportModal').remove();
  showToast('Exported ' + rows.length + ' tickets');
}

function routeToCode(part){
  const clean = part.trim();
  if (clean.length <= 4) return clean.toUpperCase();
  return clean.slice(0,3).toUpperCase();
}
function flightLine(routeStr){
  const parts = String(routeStr||'').split('-').map(s=>s.trim()).filter(Boolean);
  if (parts.length === 0) return '<span>—</span>';
  const codes = parts.map(routeToCode);
  let html = `<span class="flight-line">`;
  codes.forEach((c,i)=>{
    html += `<span class="code">${escapeHtml(c)}</span>`;
    if (i < codes.length-1) html += `<span class="track"></span>`;
  });
  html += `</span>`;
  return html;
}

/* ============================== THEME ============================== */
let THEME = 'light';
function applyTheme(mode, animate){
  THEME = mode;
  document.documentElement.setAttribute('data-theme', mode);
  const sun = document.getElementById('themeIconSun');
  const moon = document.getElementById('themeIconMoon');
  sun.style.display = mode==='dark' ? 'none' : 'block';
  moon.style.display = mode==='dark' ? 'block' : 'none';
  if (animate){
    const btn = document.getElementById('themeToggle');
    btn.classList.remove('spin'); void btn.offsetWidth; btn.classList.add('spin');
  }
}
async function toggleTheme(){
  const next = THEME === 'dark' ? 'light' : 'dark';
  applyTheme(next, true);
  try{ await window.storage.set('transborder_theme', next, false); }catch(e){}
}
async function initTheme(){
  let saved = null;
  try{
    const r = await window.storage.get('transborder_theme', false);
    if (r && r.value) saved = r.value;
  }catch(e){}
  if (saved === 'dark' || saved === 'light'){
    applyTheme(saved, false);
  } else {
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light', false);
  }
}

/* number count-up animation for board values */
function animateCount(el, target, isMoney, isShort){
  const dur = MOTION==='tactile' ? 600 : 420;
  const start = performance.now();
  const from = 0;
  function step(now){
    const p = Math.min(1, (now-start)/dur);
    const eased = 1 - Math.pow(1-p, 3);
    const val = from + (target-from)*eased;
    el.textContent = isShort ? fmtMoneyShort(val) : (isMoney ? fmtMoney(val) : Math.round(val).toLocaleString());
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = isShort ? fmtMoneyShort(target) : (isMoney ? fmtMoney(target) : Math.round(target).toLocaleString());
  }
  requestAnimationFrame(step);
}
function mountCountAnimations(){
  document.querySelectorAll('.count-anim').forEach(el=>{
    const target = parseFloat(el.dataset.target||'0');
    const isMoney = el.dataset.money === '1';
    const isShort = el.dataset.short === '1';
    animateCount(el, target, isMoney, isShort);
  });
}

/* ============================== GOOGLE SHEETS API ============================== */
async function sheetsAPI(action, payload={}){
  // Use google.script.run when served directly from Apps Script
  const isAppsScript = typeof google !== 'undefined' && google.script;
  if (isAppsScript) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(result => {
          if (result && result.error) reject(new Error(result.error));
          else resolve(result);
        })
        .withFailureHandler(err => reject(new Error(err.message || String(err))))
        .handleRequest(JSON.stringify({ action, ...payload }));
    });
  }
  // Use GET with encoded payload — works from GitHub Pages (no CORS issue)
  if (!APPS_SCRIPT_URL) throw new Error('Apps Script URL not configured.');
  const body = JSON.stringify({ action, ...payload });
  const url = APPS_SCRIPT_URL + '?payload=' + encodeURIComponent(body);
  const res = await fetch(url, { method: 'GET', redirect: 'follow' });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('Invalid response: ' + text.slice(0,200)); }
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadDB(){
  // Always clear stale cache — always load fresh from Sheets
  try{ localStorage.removeItem('transborder_db_v5'); }catch(e){}
  // Check if Apps Script URL is configured
  if (!APPS_SCRIPT_URL){
    await seedDemoData();
    showToast('⚠ Apps Script URL not set — using demo data.');
    return;
  }
  showToast('Loading data…');
  try{
    const data = await sheetsAPI('loadAll');
    DB = data.db;
    if (!DB.meta) DB.meta = { nextInvoiceSeq: 1 };
    // Re-attach flat payments table back onto each reimbursement
    if (Array.isArray(DB.payments) && DB.payments.length > 0) {
      (DB.reimbursements||[]).forEach(r => { r.payments = []; });
      DB.payments.forEach(p => {
        const r = (DB.reimbursements||[]).find(x => x.id === p.reimbursementId);
        if (r) r.payments.push({amount: Number(p.amount||0), date: p.date, note: p.note||''});
      });
    } else {
      (DB.reimbursements||[]).forEach(r => { if (!Array.isArray(r.payments)) r.payments = []; });
    }
    autoFlagTickets(true);
    try{ localStorage.setItem('transborder_db_v5', JSON.stringify(DB)); }catch(e){}
    showToast('Loaded: ' + DB.clients?.length + ' clients, ' + DB.tickets?.length + ' tickets');
    render();
  }catch(e){
    // Fall back to local cache
    try{
      const saved = localStorage.getItem('transborder_db_v5');
      if (saved){ DB = JSON.parse(saved); autoFlagTickets(); render(); showToast('⚠ Loaded from cache — ' + e.message); return; }
    }catch(e2){}
    await seedDemoData();
    showToast('⚠ Could not load — ' + e.message);
  }
}

// Background sync queue — batches rapid saves into one Sheets write
let _syncTimer = null;
let _syncPending = false;

function saveDB(){
  // 1. Save to localStorage instantly — UI never waits
  try{ localStorage.setItem('transborder_db_v5', JSON.stringify(DB)); }catch(e){}
  // 2. Debounce Sheets sync — wait 1.5s after last change, then sync once
  if (!APPS_SCRIPT_URL) return Promise.resolve();
  _syncPending = true;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(()=>{ _syncTimer=null; _flushToSheets(); }, 1500);
  return Promise.resolve(); // returns instantly
}

async function _flushToSheets(){
  if (!_syncPending) return;
  _syncPending = false;
  try{
    const payments = [];
    (DB.reimbursements||[]).forEach(r=>{
      (r.payments||[]).forEach(p=>{
        payments.push({...p, reimbursementId: r.id});
      });
    });
    await sheetsAPI('saveAll', { db: { ...DB, payments } });
    // Small green dot to show sync happened — unobtrusive
    showSyncDot();
  }catch(e){
    console.error('Sheets sync failed:', e);
    showToast('⚠ Sync failed — data saved locally: ' + e.message);
    _syncPending = true; // retry on next save
  }
}

function showSyncDot(){
  let dot = document.getElementById('syncDot');
  if (!dot){
    dot = document.createElement('div');
    dot.id = 'syncDot';
    dot.style.cssText = 'position:fixed;bottom:18px;right:18px;width:8px;height:8px;border-radius:50%;background:#22c55e;opacity:0;transition:opacity 0.3s;z-index:9999;pointer-events:none;';
    document.body.appendChild(dot);
  }

}

async function uploadFileToDrive(file){
  if (!APPS_SCRIPT_URL) throw new Error('Apps Script URL not configured');
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        const data = await sheetsAPI('uploadFile', {
          fileName: file.name,
          mimeType: file.type,
          base64Data: base64,
        });
        resolve({ url: data.url, name: file.name });
      } catch(err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

/* ============================== DERIVED DATA ============================== */
function clientById(id){ return DB.clients.find(c=>c.id===id); }
function airlineById(id){ return DB.airlines.find(a=>a.id===id); }
function invoiceById(id){ return DB.invoices.find(i=>i.id===id); }
function orderById(id){ return DB.orders.find(o=>o.id===id); }
function reimbById(id){ return DB.reimbursements.find(r=>r.id===id); }
function ticketsForOrder(orderId){ return DB.tickets.filter(t=>t.orderId===orderId); }
function ticketsForClient(clientId){ return DB.tickets.filter(t=>{ const o=orderById(t.orderId); return o && o.clientId===clientId; }); }
function ticketTotal(t){ return Number(t.ticketCost||0) + Number(t.serviceCharge||0); }
function ticketVat(t){ return Number(t.serviceCharge||0) * 0.075; }
function ticketGrandTotal(t){ return ticketTotal(t) + ticketVat(t); }

function clientStats(clientId){
  const tks = ticketsForClient(clientId);
  const revenue = tks.reduce((s,t)=>s+ticketGrandTotal(t),0);
  const commission = tks.reduce((s,t)=>s+Number(t.serviceCharge||0),0);
  const orderCount = DB.orders.filter(o=>o.clientId===clientId).length;
  const invs = DB.invoices.filter(i=>i.clientId===clientId);
  const outstanding = invs.filter(i=>invoiceComputedStatus(i)!=='Paid').reduce((s,i)=>s+invoiceTotal(i),0);
  return {ticketCount:tks.length, orderCount, revenue, commission, invoiceCount:invs.length, outstanding};
}
function invoiceLineItems(inv){ return DB.tickets.filter(t=>t.invoiceId===inv.id); }
function invoiceSubtotal(inv){ return invoiceLineItems(inv).reduce((s,t)=>s+ticketTotal(t),0); }
function invoiceVat(inv){ return invoiceLineItems(inv).reduce((s,t)=>s+ticketVat(t),0); }
function invoiceTotal(inv){ return invoiceSubtotal(inv) + invoiceVat(inv); }
function invoiceComputedStatus(inv){
  if (inv.status === 'Paid') return 'Paid';
  if (inv.dueDate && inv.dueDate < todayISO() && inv.status !== 'Draft') return 'Overdue';
  return inv.status;
}
function reimbTotal(r){ return (r.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0); }
function reimbStatus(r){
  const paid = reimbTotal(r);
  if (paid <= 0) return 'Pending';
  if (paid >= Number(r.amountExpected||0)) return 'Paid';
  return 'Partial';
}
function globalStats(){
  const totalTickets = DB.tickets.length;
  const totalRevenue = DB.tickets.reduce((s,t)=>s+ticketGrandTotal(t),0);
  const totalCommission = DB.tickets.reduce((s,t)=>s+Number(t.serviceCharge||0),0);
  const totalCost = DB.tickets.reduce((s,t)=>s+Number(t.ticketCost||0),0);
  const outstanding = DB.invoices.filter(i=>invoiceComputedStatus(i)!=='Paid').reduce((s,i)=>s+invoiceTotal(i),0);
  const overdueCount = DB.invoices.filter(i=>invoiceComputedStatus(i)==='Overdue').length;
  const unbilled = DB.tickets.filter(t=>!t.invoiceId);
  const flaggedCount = DB.tickets.filter(t=>t.usageFlag && t.status==='Issued').length;
  return {totalTickets, totalRevenue, totalCommission, totalCost, outstanding, overdueCount, unbilledCount:unbilled.length, flaggedCount};
}
function topClients(n=5){
  return DB.clients.map(c=>({client:c, stats:clientStats(c.id)})).sort((a,b)=>b.stats.revenue - a.stats.revenue).slice(0,n);
}

function statusBadge(status){
  const map = {Issued:'issued', Used:'used', Cancelled:'cancelled', Refunded:'refunded', Paid:'paid', Sent:'sent', Overdue:'overdue', Draft:'draft', Pending:'pending', Partial:'partial', Flagged:'flagged'};
  return `<span class="badge badge-${map[status]||'draft'}">${escapeHtml(status)}</span>`;
}
function tierBadge(tier){
  if (tier==='VIP') return `<span class="badge badge-vip">${ICONS.star.replace('viewBox="0 0 24 24"','viewBox="0 0 24 24" width="10" height="10"')} VIP</span>`;

}

async function confirmTicketUsage(ticketId, action){
  const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
  if (action==='Used'){ t.status='Used'; t.usageFlag=false; }
  else { t.usageFlag=false; }
  await saveDB(); render();
  const o = orderById(t.orderId); if(o) viewOrderPanel(o.id);
  showToast(action==='Used' ? 'Ticket marked as used' : 'Flag dismissed');
}

async function saveOrder(orderId){
  const clientId = document.getElementById('f_orderClient').value;
  const orderRef = document.getElementById('f_orderRef').value.trim();
  const notes = document.getElementById('f_orderNotes').value.trim();
  if (!clientId || !orderRef){ showToast('Client and order reference are required'); return; }

  const cards = [...document.querySelectorAll('#paxCardList .pax-card')];
  if (!cards.length){ showToast('Add at least one passenger'); return; }
  const paxData = cards.map(card => ({
    passengerName: card.querySelector('.px-name').value.trim(),
    airlineId: card.querySelector('.px-airline').value,
    route: card.querySelector('.px-route').value.trim(),
    bookingRef: card.querySelector('.px-ref').value.trim(),
    travelDate: card.querySelector('.px-date').value,
    status: card.querySelector('.px-status').value,
    ticketCost: parseFloat(card.querySelector('.px-cost').value) || 0,
    serviceCharge: parseFloat(card.querySelector('.px-charge').value) || 0,
  }));
  if (paxData.some(p=>!p.passengerName || !p.airlineId || !p.route)){ showToast('Fill in name, airline and route for every passenger'); return; }

  if (orderId){
    const o = orderById(orderId);
    Object.assign(o, {clientId, orderRef, notes});
    const existing = ticketsForOrder(orderId);
    paxData.forEach((pd,i)=>{
      if (i < existing.length){ Object.assign(existing[i], pd); }
      else { DB.tickets.push({id:uid('tk'), orderId, ...pd, usageFlag:false, invoiceId:null, attachmentData:null, attachmentUrl:null, attachmentName:null, createdAt:todayISO()}); }
    });
    if (existing.length > paxData.length){
      const removeIds = existing.slice(paxData.length).map(t=>t.id);
      DB.tickets = DB.tickets.filter(t=>!removeIds.includes(t.id));
    }
  } else {
    const o = {id:uid('or'), clientId, orderRef, notes, createdAt:todayISO()};
    DB.orders.push(o);
    paxData.forEach(pd=>{
      DB.tickets.push({id:uid('tk'), orderId:o.id, ...pd, usageFlag:false, invoiceId:null, attachmentData:null, attachmentUrl:null, attachmentName:null, createdAt:todayISO()});
    });
  }
  await saveDB(); closeSidePanel(); render(); showToast(orderId?'Order updated':'Order created');
}

function renderContentOnly(){

}

              ${ICONS.attach}<div class="upload-zone-label">Click to upload ticket PDF or image</div><div class="upload-zone-sub">Saved for reference, viewable anytime</div>
            </div>`}

function handleTicketUpload(ticketId, input){
  const file = input.files[0]; if(!file) return;
  showToast('Uploading to Drive…');
  uploadFileToDrive(file).then(async (result)=>{
    const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
    t.attachmentUrl = result.url; t.attachmentName = result.name;
    t.attachmentData = null; // no longer store base64
    await saveDB(); openTicketEditPanel(ticketId); showToast('Ticket uploaded to Drive ✓');
  }).catch(err=>{
    // Fallback: store as base64 locally if Drive upload fails
    const reader = new FileReader();
    reader.onload = async (e)=>{
      const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
      t.attachmentData = e.target.result; t.attachmentName = file.name; t.attachmentUrl = null;
      await saveDB(); openTicketEditPanel(ticketId); showToast('Saved locally (Drive unavailable)');
    };
    reader.readAsDataURL(file);
  });
}
async function removeAttachment(ticketId){
  const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
  t.attachmentData = null; t.attachmentName = null; t.attachmentUrl = null;
  await saveDB(); openTicketEditPanel(ticketId); showToast('Attachment removed');
}
function viewAttachment(ticketId){
  const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
  if (t.attachmentUrl){
    window.open(t.attachmentUrl, '_blank'); return;
  }
  if (!t.attachmentData) return;
  const w = window.open('', '_blank');
  if ((t.attachmentName||'').toLowerCase().endsWith('.pdf')){
    w.document.write(`<html><body style="margin:0;"><embed src="${t.attachmentData}" width="100%" height="100%" type="application/pdf"/></body></html>`);
  } else {
    w.document.write(`<html><body style="margin:0;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;"><img src="${t.attachmentData}" style="max-width:100%;max-height:100vh;"/></body></html>`);
  }
  w.document.close();
}

async function saveTicketEdit(ticketId){
  const t = DB.tickets.find(x=>x.id===ticketId); if(!t) return;
  t.passengerName = document.getElementById('et_name').value.trim() || t.passengerName;
  t.airlineId = document.getElementById('et_airline').value || t.airlineId;
  t.route = document.getElementById('et_route').value.trim() || t.route;
  t.bookingRef = document.getElementById('et_ref').value.trim();
  t.travelDate = document.getElementById('et_date').value;
  t.status = document.getElementById('et_status').value;
  t.ticketCost = parseFloat(document.getElementById('et_cost').value) || 0;
  t.serviceCharge = parseFloat(document.getElementById('et_charge').value) || 0;
  if (t.status !== 'Issued') t.usageFlag = false;
  await saveDB(); closeSidePanel(); render(); showToast('Ticket updated');
}

function openSelectiveInvoicePanel(clientId, filterOrderId){
  const client = clientById(clientId);
  const allUnbilled = ticketsForClient(clientId).filter(t=>!t.invoiceId);
  if (!allUnbilled.length){ showToast('No unbilled tickets for this client'); return; }

  // Build order options for filter
  const clientOrders = DB.orders.filter(o=>o.clientId===clientId && ticketsForOrder(o.id).some(t=>!t.invoiceId));
  const orderFilterOpts = clientOrders.map(o=>`<option value="${o.id}" ${filterOrderId===o.id?'selected':''}>${escapeHtml(o.orderRef)}</option>`).join('');

  // Apply order filter
  const unbilled = filterOrderId ? allUnbilled.filter(t=>t.orderId===filterOrderId) : allUnbilled;

  const html = `
    <div class="sp-header">
      <div><div class="sp-title">Create invoice</div><div class="sp-sub">Select tickets — ${escapeHtml(client?.name||'')}</div></div>
      <div class="sp-close" onclick="closeSidePanel()">${ICONS.x}</div>
    </div>
    <div class="sp-body">

function toggleAllSelInv(el){

function updateSelectiveInvoicePreview(){

async function createSelectiveInvoice(clientId){
  const ids = selectedInvoiceTicketIds();
  if (!ids.length){ showToast('Select at least one ticket'); return; }
  const issueDate = document.getElementById('si_date').value || todayISO();
  const terms = parseInt(document.getElementById('si_terms').value) || 14;
  const seq = DB.meta.nextInvoiceSeq++;
  const now = new Date();
  const yymm = String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0');
  const invoiceNo = `${yymm}-${String(seq).padStart(3,'0')}`;
  const inv = { id: uid('inv'), invoiceNo, clientId, issueDate, dueDate: addDays(issueDate, terms), status:'Draft', createdAt: todayISO() };
  DB.invoices.push(inv);
  ids.forEach(id=>{ const t = DB.tickets.find(x=>x.id===id); if (t) t.invoiceId = inv.id; });
  await saveDB(); closeSidePanel(); render(); showToast(`Invoice ${invoiceNo} created`);
  setTimeout(()=>viewInvoicePanel(inv.id), MOTION==='tactile'?420:220);
}

/* ============================== REIMBURSEMENTS ============================== */
function renderReimbursements(){
  let list = [...DB.reimbursements];
  if (REIMB_FILTERS.status) list = list.filter(r=>reimbStatus(r)===REIMB_FILTERS.status);
  list.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));

  return `
    <div class="panel">
      <div class="panel-header">
        <div class="filter-bar">
          <select class="filter-select" onchange="REIMB_FILTERS.status=this.value; render()">
            <option value="">All statuses</option>${['Pending','Partial','Paid'].map(s=>`<option value="${s}" ${REIMB_FILTERS.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div style="font-size:12px; color:var(--mute-2); font-weight:600;">${list.length} reimbursement${list.length===1?'':'s'}</div>
      </div>
      <div class="panel-body flush">
        ${list.length===0 ? emptyState('No reimbursements','Track client payments against your invoices here') : `
        <table>
          <thead><tr><th>Invoice</th><th>Client</th><th class="num">Expected</th><th class="num">Received</th><th class="num">Balance</th><th style="min-width:110px;">Progress</th><th>Status</th><th></th></tr></thead>
          <tbody class="stagger">
            ${list.map((r,i)=>{
              const client = clientById(r.clientId);
              const paid = reimbTotal(r); const exp = Number(r.amountExpected||0); const st = reimbStatus(r);
              const pct = exp ? Math.min(100, (paid/exp)*100) : 0;
              const invLabel = (r.invoiceIds||[]).map(id=>invoiceById(id)?.invoiceNo||'').filter(Boolean).join(', ') || '—';
              return `
              <tr style="cursor:pointer; animation-delay:${i*30}ms" onclick="viewReimbPanel('${r.id}')">
                <td><span class="mono" style="font-size:12px; font-weight:700;">${escapeHtml(invLabel)}</span></td>
                <td>${escapeHtml(client?.name||'—')} ${client?.tier==='VIP'?tierBadge('VIP'):''}</td>
                <td class="num">${fmtMoney(exp)}</td>
                <td class="num" style="color:var(--green); font-weight:600;">${fmtMoney(paid)}</td>
                <td class="num" style="${exp-paid>0?'color:var(--red);':''}">${fmtMoney(Math.max(0,exp-paid))}</td>
                <td><div class="progress-wrap"><div class="progress-fill ${st.toLowerCase()}" style="width:${pct}%;"></div></div><div style="font-size:10px; color:var(--mute-2); margin-top:4px;">${pct.toFixed(0)}%</div></td>
                <td>${statusBadge(st)}</td>
                <td><div class="row-actions">${PERMS[ROLE].delete?`<div class="icon-btn" onclick="event.stopPropagation(); deleteReimb('${r.id}')" title="Delete">${ICONS.trash}</div>`:''}</div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `;
}

function openReimbPanel(){
  const unpaidInvoices = DB.invoices.filter(i=>invoiceComputedStatus(i)!=='Paid');
  if (!unpaidInvoices.length){ showToast('No unpaid invoices to create a reimbursement for'); return; }
  const invOpts = unpaidInvoices.map(i=>{
    const c = clientById(i.clientId);
    return `<option value="${i.id}" data-total="${invoiceTotal(i)}" data-client="${i.clientId}">${escapeHtml(i.invoiceNo)} — ${escapeHtml(c?.name||'?')} — ${fmtMoney(invoiceTotal(i))}</option>`;
  }).join('');
  const html = `
    <div class="sp-header">
      <div><div class="sp-title">New reimbursement</div><div class="sp-sub">Track a client payment against a specific invoice</div></div>
      <div class="sp-close" onclick="closeSidePanel()">${ICONS.x}</div>
    </div>
    <div class="sp-body">
      <div class="form-grid">
        <div class="field full"><label>Invoice</label>
          <select id="fr_invoice" onchange="reimbInvoiceChanged(this)">${invOpts}</select>
        </div>
        <div class="field full"><label>Expected reimbursement (₦) <span style="font-size:10px;color:var(--mute-2);">— auto-filled from invoice</span></label>
          <input type="number" id="fr_expected" placeholder="0.00"/>
        </div>
        <div class="field full"><label>Notes (optional)</label><input id="fr_notes" placeholder="e.g. Bank transfer ref, cheque no…"/></div>
      </div>
    </div>
    <div class="sp-footer">
      <button class="btn" onclick="closeSidePanel()">Cancel</button>
      <button class="btn btn-primary" onclick="saveReimb()">Create</button>
    </div>
  `;
  openSidePanel(html);
  setTimeout(()=>{ const sel=document.getElementById('fr_invoice'); if(sel) reimbInvoiceChanged(sel); },50);
}
function reimbInvoiceChanged(sel){
  const opt = sel.options[sel.selectedIndex]; if(!opt) return;
  const amtEl = document.getElementById('fr_expected');
  if(amtEl) amtEl.value = (parseFloat(opt.dataset.total)||0).toFixed(2);
}
async function saveReimb(){
  const invId = document.getElementById('fr_invoice').value;
  const inv = invoiceById(invId);
  if(!inv){ showToast('Select an invoice'); return; }
  const amountExpected = parseFloat(document.getElementById('fr_expected').value) || 0;
  const notes = document.getElementById('fr_notes').value.trim();
  if(!amountExpected){ showToast('Expected amount is required'); return; }
  const existing = DB.reimbursements.find(r=>r.invoiceIds&&r.invoiceIds.includes(invId));
  if(existing){ showToast('A reimbursement tracker already exists for this invoice'); return; }
  DB.reimbursements.push({ id:uid('rb'), clientId:inv.clientId, invoiceIds:[invId], amountExpected, payments:[], notes, createdAt:todayISO() });
  await saveDB(); closeSidePanel(); render(); showToast('Reimbursement tracker created');
}

function viewReimbPanel(id){
  const r = reimbById(id); if(!r) return;
  const client = clientById(r.clientId);
  const paid = reimbTotal(r); const exp = Number(r.amountExpected||0); const st = reimbStatus(r);
  const pct = exp ? Math.min(100, (paid/exp)*100) : 0;

  const html = `
    <div class="sp-header">
      <div><div class="sp-title">${(r.invoiceIds||[]).map(id=>invoiceById(id)?.invoiceNo||'').filter(Boolean).join(', ') || 'Reimbursement'}</div><div class="sp-sub">${escapeHtml(client?.name||'')}</div></div>
      <div class="sp-close" onclick="closeSidePanel()">${ICONS.x}</div>
    </div>
    <div class="sp-body">
      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:11px;">
          <div><div style="font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); font-weight:700; margin-bottom:3px;">Expected</div><div style="font-size:22px; font-weight:800;">${fmtMoney(exp)}</div></div>
          <div style="text-align:right;"><div style="font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); font-weight:700; margin-bottom:3px;">Received</div><div style="font-size:22px; font-weight:800; color:var(--green);">${fmtMoney(paid)}</div></div>
        </div>
        <div class="progress-wrap" style="height:14px; margin-bottom:7px;"><div class="progress-fill ${st.toLowerCase()}" style="width:${pct}%;"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:11.5px;">
          <span style="color:var(--mute-2);">${pct.toFixed(0)}% paid</span>
          <span style="${exp-paid>0?'color:var(--red); font-weight:600;':'color:var(--green); font-weight:600;'}">Balance: ${fmtMoney(Math.max(0,exp-paid))}</span>
        </div>
      </div>
      ${(r.invoiceIds||[]).length ? `
      <div style="margin-bottom:18px;">
        <div style="font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); margin-bottom:9px;">Linked invoices</div>
        ${r.invoiceIds.map(id=>{
          const inv = invoiceById(id); if(!inv) return '';
          return `<div style="display:flex; justify-content:space-between; padding:9px 13px; background:var(--paper-2); border-radius:8px; margin-bottom:7px; font-size:12.5px; cursor:pointer;" onclick="viewInvoicePanel('${id}')"><span class="mono">${escapeHtml(inv.invoiceNo)}</span><span style="font-weight:600;">${fmtMoney(invoiceTotal(inv))}</span></div>`;
        }).join('')}
      </div>` : ''}
      <div style="font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--mute-2); margin-bottom:9px;">Payment history</div>
      ${(r.payments||[]).length===0 ? `<div style="color:var(--mute-2); font-size:12.5px; padding:9px 0;">No payments recorded yet</div>` :
        r.payments.map(p=>`
        <div style="display:flex; justify-content:space-between; padding:10px 13px; border:1px solid var(--line); border-radius:8px; margin-bottom:7px; font-size:12.5px;">
          <div><div style="font-weight:600;">${fmtMoney(p.amount)}</div><div style="font-size:11px; color:var(--mute-2); margin-top:3px;">${fmtDate(p.date)} ${p.note?'· '+escapeHtml(p.note):''}</div></div>
          <span class="badge badge-paid">Received</span>
        </div>`).join('')}
      ${st!=='Paid' && PERMS[ROLE].reimbursements ? `
      <div style="margin-top:18px; padding:15px; background:var(--paper-2); border-radius:9px;">
        <div style="font-size:12px; font-weight:700; margin-bottom:11px;">Record payment</div>
        <div class="form-grid">
          <div class="field"><label>Amount (₦)</label><input type="number" id="rp_amount" placeholder="0.00"/></div>
          <div class="field"><label>Date</label><input type="date" id="rp_date" value="${todayISO()}"/></div>
          <div class="field full"><label>Note (optional)</label><input id="rp_note" placeholder="e.g. Bank transfer ref XYZ"/></div>
        </div>
        <button class="btn btn-primary" style="margin-top:11px; width:100%;" onclick="recordPayment('${id}')">Record payment</button>
      </div>` : ''}
    </div>
  `;
  openSidePanel(html, true);
}
async function recordPayment(reimbId){
  const r = reimbById(reimbId); if(!r) return;
  const amount = parseFloat(document.getElementById('rp_amount').value) || 0;
  if (!amount){ showToast('Enter an amount'); return; }
  const date = document.getElementById('rp_date').value || todayISO();
  const note = document.getElementById('rp_note').value.trim();
  r.payments.push({amount, date, note});
  await saveDB(); render(); showToast('Payment recorded'); viewReimbPanel(reimbId);
}
async function deleteReimb(id){
  if(!confirm('Delete this reimbursement tracker?')) return;
  DB.reimbursements = DB.reimbursements.filter(r=>r.id!==id);
  await saveDB(); render(); showToast('Deleted');
}

  const cols = [
    {key:'open', label:'Open', cls:'badge-issued', filter:t=>t.status==='Issued' && !t.usageFlag},
    {key:'flag', label:'Needs Confirmation', cls:'badge-flagged', filter:t=>t.status==='Issued' && t.usageFlag},
    {key:'used', label:'Used', cls:'badge-used', filter:t=>t.status==='Used'},
    {key:'cancel', label:'Cancelled / Refunded', cls:'badge-draft', filter:t=>t.status==='Cancelled' || t.status==='Refunded'},
  ];
  return `
    <div style="margin-bottom:13px; font-size:12.5px; color:var(--mute-2);">System auto-flags tickets whose travel date has passed. Confirm actual usage below.</div>
    <div class="kanban">
      ${cols.map(col=>{
        const tks = DB.tickets.filter(col.filter);
        return `
        <div class="kanban-col">
          <div class="kanban-col-header">
            <span class="badge ${col.cls}" style="text-transform:none; font-size:10.5px;">${col.label}</span>
            <div class="kanban-col-count">${tks.length}</div>
          </div>
          ${tks.length===0 ? `<div style="font-size:11.5px; color:var(--mute-2); padding:9px 0; text-align:center;">None</div>` : tks.map(t=>{
            const o = orderById(t.orderId); const client = clientById(o?.clientId); const airline = airlineById(t.airlineId);
            return `
            <div class="kanban-card" onclick="openTicketEditPanel('${t.id}')">
              <div class="kanban-card-pax">${escapeHtml(t.passengerName)}</div>
              <div class="kanban-card-route">${escapeHtml(t.route.split('-').map(p=>routeToCode(p.trim())).join(' → '))}</div>
              <div style="font-size:10.5px; color:var(--mute-2); margin-top:4px;">${escapeHtml(airline?.name||'—')}</div>
              ${t.bookingRef ? `<div class="mono" style="font-size:10px; color:var(--mute-2);">${escapeHtml(t.bookingRef)}</div>` : ''}
              <div class="kanban-card-date">Travel: ${fmtDate(t.travelDate)}</div>
              <div style="font-size:10.5px; color:var(--mute-2);">${escapeHtml(client?.name||'—')}</div>
              ${t.usageFlag && t.status==='Issued' ? `
              <div class="kanban-card-flag">⚠ Past travel date</div>
              <div style="display:flex; gap:6px; margin-top:9px;">
                <button class="btn btn-sm" onclick="event.stopPropagation(); confirmTicketUsage('${t.id}','Used')" style="font-size:10.5px; padding:4px 8px; flex:1; border-color:var(--green); color:var(--green);">Mark Used</button>
                <button class="btn btn-sm" onclick="event.stopPropagation(); confirmTicketUsage('${t.id}','dismiss')" style="font-size:10.5px; padding:4px 8px; flex:1;">Dismiss</button>
              </div>` : ''}
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}

/* ============================== REPORTS ============================== */
function renderReports(){
  const g = globalStats();
  const top = topClients(10);
  const byAirline = DB.airlines.map(a=>{
    const tks = DB.tickets.filter(t=>t.airlineId===a.id);
    return {airline:a, count:tks.length, value:tks.reduce((s,t)=>s+Number(t.ticketCost||0),0), commission:tks.reduce((s,t)=>s+Number(t.serviceCharge||0),0)};
  }).filter(x=>x.count>0).sort((a,b)=>b.value-a.value);
  const vipCount = DB.clients.filter(c=>c.tier==='VIP').length;
  const margin = g.totalRevenue>0 ? (g.totalCommission/(g.totalCost+g.totalCommission)*100) : 0;

  return `
    <div class="board">
      <div class="board-cell"><div class="board-label">Total commission</div><div class="board-value count-anim" data-target="${g.totalCommission}" data-short="1">₦0</div><div class="board-delta up">${margin.toFixed(1)}% of gross billed</div></div>
      <div class="board-cell"><div class="board-label">Total ticket cost</div><div class="board-value count-anim" data-target="${g.totalCost}" data-short="1">₦0</div><div class="board-delta">Passed through to airlines</div></div>
      <div class="board-cell"><div class="board-label">Unbilled tickets</div><div class="board-value">${g.unbilledCount}</div><div class="board-delta ${g.unbilledCount>0?'down':''}">${g.unbilledCount>0?'Action needed':'All billed'}</div></div>
      <div class="board-cell"><div class="board-label">Awaiting usage confirmation</div><div class="board-value">${g.flaggedCount}</div><div class="board-delta ${g.flaggedCount>0?'down':''}">${g.flaggedCount>0?'Review in Ticket Usage':'All confirmed'}</div></div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="panel-title">Client performance ranking</div></div>
      <div class="panel-body flush">
        ${top.length===0?emptyState('No data yet',''):`
        <table>
          <thead><tr><th>#</th><th>Client</th><th>Tier</th><th class="num">Tickets</th><th class="num">Commission</th><th class="num">Total billed</th><th class="num">Outstanding</th></tr></thead>
          <tbody class="stagger">
            ${top.map((x,i)=>`
              <tr style="animation-delay:${i*30}ms">
                <td style="font-weight:700; color:var(--mute-2);">${i+1}</td>
                <td>${escapeHtml(x.client.name)}</td><td>${tierBadge(x.client.tier)}</td>
                <td class="num">${x.stats.ticketCount}</td>
                <td class="num" style="color:var(--green); font-weight:600;">${fmtMoney(x.stats.commission)}</td>
                <td class="num" style="font-weight:700;">${fmtMoney(x.stats.revenue)}</td>
                <td class="num" style="${x.stats.outstanding>0?'color:var(--red); font-weight:600;':''}">${x.stats.outstanding>0?fmtMoney(x.stats.outstanding):'—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="panel-title">Airline distribution</div></div>
      <div class="panel-body flush">
        ${byAirline.length===0?emptyState('No data yet',''):`
        <table>
          <thead><tr><th>Airline</th><th class="num">Tickets</th><th class="num">Ticket value</th><th class="num">Commission generated</th></tr></thead>
          <tbody class="stagger">
            ${byAirline.map((x,i)=>`<tr style="animation-delay:${i*30}ms"><td>${escapeHtml(x.airline.name)}</td><td class="num">${x.count}</td><td class="num">${fmtMoney(x.value)}</td><td class="num" style="color:var(--green); font-weight:600;">${fmtMoney(x.commission)}</td></tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `;
}

/* ============================== SIDE PANEL HELPERS ============================== */
function openSidePanel(html, wide){
  const panel = document.getElementById('sidePanel');
  panel.classList.toggle('wide', !!wide);
  panel.innerHTML = html;
  document.getElementById('panelScrim').classList.add('open');
  requestAnimationFrame(()=>panel.classList.add('open'));
}
function closeSidePanel(){
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('panelScrim').classList.remove('open');
}

/* ============================== COMMAND PALETTE ============================== */
function openPalette(){
  document.getElementById('paletteScrim').classList.add('open');
  const input = document.getElementById('paletteInput');
  input.value=''; paletteSearch('');
  setTimeout(()=>input.focus(), MOTION==='tactile'?80:40);
}
function closePalette(){ document.getElementById('paletteScrim').classList.remove('open'); }

function paletteSearch(q){
  q = q.toLowerCase().trim();
  const results = [];
  if (!q){
    results.push({type:'nav', label:'Go to Dashboard', sub:'Overview', action:"navigate('dashboard'); closePalette();", icon:'dashboard_placeholder'});
    NAV_STRUCTURE.flatMap(g=>g.items).forEach(it=>{
      if (!it.perm || PERMS[ROLE][it.perm]) results.push({type:'nav', label:'Go to '+it.label, sub:it.label==='Invoices'||it.label==='Reimbursements'?'Finance':'Operations', action:`navigate('${it.id}'); closePalette();`, icon:it.icon});
    });
  } else {
    DB.tickets.filter(t=>t.passengerName.toLowerCase().includes(q)||t.route.toLowerCase().includes(q)||(t.bookingRef||'').toLowerCase().includes(q)).slice(0,4).forEach(t=>{
      results.push({type:'ticket', label:t.passengerName, sub:`${t.route} · ${t.bookingRef||'no ref'}`, action:`navigate('tickets'); closePalette(); setTimeout(()=>openTicketEditPanel('${t.id}'), 250);`, icon:'ticket'});
    });
    DB.orders.filter(o=>o.orderRef.toLowerCase().includes(q)||(clientById(o.clientId)?.name||'').toLowerCase().includes(q)).slice(0,4).forEach(o=>{
      results.push({type:'order', label:o.orderRef, sub:clientById(o.clientId)?.name||'', action:`navigate('orders'); closePalette(); setTimeout(()=>viewOrderPanel('${o.id}'), 250);`, icon:'order'});
    });
    DB.clients.filter(c=>c.name.toLowerCase().includes(q)).slice(0,4).forEach(c=>{
      results.push({type:'client', label:c.name, sub:c.type||'Client', action:`closePalette(); setTimeout(()=>viewClient('${c.id}'), 250);`, icon:'clients'});
    });
    if (PERMS[ROLE].invoices) DB.invoices.filter(i=>i.invoiceNo.toLowerCase().includes(q)).slice(0,4).forEach(i=>{
      results.push({type:'invoice', label:i.invoiceNo, sub:clientById(i.clientId)?.name||'', action:`navigate('invoices'); closePalette(); setTimeout(()=>viewInvoicePanel('${i.id}'), 250);`, icon:'invoice'});
    });
  }
  const wrap = document.getElementById('paletteResults');
  if (results.length===0){ wrap.innerHTML = `<div class="palette-empty">No matches for "${escapeHtml(q)}"</div>`; return; }
  wrap.innerHTML = results.map(r=>`
    <div class="palette-item" onclick="${r.action}">
      <div class="palette-item-icon">${ICONS[r.icon]||ICONS.search}</div>
      <div class="palette-item-text"><div class="palette-item-title">${escapeHtml(r.label)}</div><div class="palette-item-sub">${escapeHtml(r.sub)}</div></div>
    </div>
  `).join('');
}
document.addEventListener('keydown', (e)=>{
  if ((e.metaKey||e.ctrlKey) && e.key==='k'){ e.preventDefault(); openPalette(); }
  if (e.key==='Escape'){ closePalette(); closeSidePanel(); }
});

/* ============================== INIT ============================== */
(async function init(){
  setMotion('subtle');
  initBrandMark();
  await initTheme();
  // Always show login first — clear any stale sessions
  try{ localStorage.removeItem('tbl_session'); }catch(e){}
  showLoginScreen();
  // Pre-load DB in background so it's ready after login
  await loadDB();
})();

// Called after successful login
async function postLoginInit(){
  render();
  updateAvatarDisplay();
}
</script>
